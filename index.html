<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turots V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 p-4">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md space-y-4">
        <h2 class="font-bold text-xl text-emerald-800">Sistem Turots V4.0 (Test Mode)</h2>
        
        <textarea id="sourceText" rows="4" class="w-full border p-3 rounded" placeholder="Ketik teks Arab di sini..."></textarea>
        
        <button id="btnProses" onclick="jalankanAI()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded hover:bg-emerald-700">
            Eksekusi Terjemahan
        </button>

        <div id="loading" class="hidden text-center text-emerald-600 font-bold">Sedang memproses... mohon tunggu!</div>
        
        <div id="hasil" class="mt-4 p-4 border rounded bg-slate-50 min-h-[100px]">Hasil akan muncul di sini...</div>
    </div>

    <script>
        // =================================================================
        // HANYA UBAH TULISAN DI DALAM TANDA KUTIP BAWAH INI DENGAN API KEY ANDA
        // =================================================================
        const API_KEY_SAYA = "AIzaSyA1J_G2Wl3J_5EVSOCCdANaVQWtChQ7Hd4";
        // =================================================================

        async function jalankanAI() {
            const teks = document.getElementById('sourceText').value;
            if (!teks) {
                alert("Teks masih kosong!"); return;
            }
            if (API_KEY_SAYA === "GANTI_TEKS_INI_DENGAN_API_KEY_ANDA") {
                alert("API Key belum dimasukkan ke dalam kode!"); return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('btnProses').disabled = true;
            document.getElementById('hasil').innerHTML = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY_SAYA}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Terjemahkan teks ini ke bahasa Indonesia akademik: " + teks }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Terjadi kesalahan pada server Google.");
                }

                const hasilTeks = data.candidates[0].content.parts[0].text;
                document.getElementById('hasil').innerHTML = marked.parse(hasilTeks);

            } catch (error) {
                // INI AKAN MEMUNCULKAN PESAN ERROR LANGSUNG DI LAYAR HP
                alert("GAGAL MEMPROSES! ALASAN: " + error.message);
                document.getElementById('hasil').innerHTML = `<span class='text-red-500'>Error: ${error.message}</span>`;
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btnProses').disabled = false;
            }
        }
    </script>
</body>
</html>
