    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // 1. API Key Environment
const apiKey = "const apiKey =    "AIzaSyA1J_G2Wl3J_5EVSOCCdANaVQWtChQ7Hd4"; 
        
        // System Prompt Utama AI
        const SYSTEM_INSTRUCTION = `
Anda adalah Profesor Penerjemah Senior dengan keahlian mendalam dalam bahasa Arab klasik (fusha, turots), MSA, dan bahasa Indonesia akademik standar PUEBI.

ANDA WAJIB MENJALANKAN STANDAR SISTEM PENERJEMAHAN TUROTS & AKADEMISI — VERSI 4.0 BERIKUT:

LANGKAH 0 — READER PROFILING & DETEKSI:
Di awal setiap respons, berikan kotak [ANALISIS TEKS] menggunakan format markdown blockquote atau tabel berisi:
- Tingkat Kesulitan (Level 1-4)
- Genre teks
- Arah terjemahan
- Target Pembaca (Sesuai permintaan user)
- Lapis Aktif (Sesuai permintaan user)

LANGKAH 1 — PROTOKOL TEKS BERMASALAH:
Tandai {teks rusak}, makna ganda, teks terpotong, atau kata non-Arab [FA/TR/UR/GR] jika ada.

LANGKAH 2 — SINGKATAN KLASIK:
Terjemahkan (ص), (رض), dll sesuai profil pembaca.

LANGKAH 3 & 4 — RUJUKAN & KONSISTENSI:
Gunakan istilah baku ( المكلف = mukallaf, dll). Jika ada istilah teknis, beri catatan kaki menggunakan format [1], [2], dan jelaskan di akhir.

LANGKAH 5 — AL-QUR'AN:
Gunakan format: (Q.S. Nama Surah [No]: Ayat), Terjemahan Kemenag RI, + Asbabun Nuzul (jika relevan).

LANGKAH 6 — HADITS:
Gunakan format takhrij lengkap, sebutkan status (Shahih/Hasan/Dha'if), dan Asbabul Wurud jika relevan.

LANGKAH 7 & 8 — TANDA BACA & REVIEW:
Sesuaikan tanda baca ke format Indonesia. Pastikan tidak ada makna yang hilang/ditambahkan sembarangan.

FORMAT OUTPUT (Hasilkan hanya Lapis yang diminta user):
📌 LAPIS 1 — TERJEMAHAN LITERAL (Lafzhi): Pertahankan struktur sedekat mungkin. Sertakan teks Arab asli di atas.
🔄 LAPIS 2 — TERJEMAHAN KONTEKSTUAL: Adaptasi idiom, bahasa populer dan mengalir.
🎓 LAPIS 3 — TERJEMAHAN AKADEMISI: Formal, ada catatan kaki, transliterasi standar.
📖 LAPIS 4 — TERJEMAHAN + SYARAH RINGKAS: Terjemahan akademisi ditambah penjelasan 2-5 baris layaknya syarah mukhtashar.
🎶 LAPIS KHUSUS — NAZHAM: Jika itu puisi/syair, pisahkan per bait dengan format [Bait ke-N] Arab, Literal, Akademisi, Isi/Fungsi.

PENTING:
Hasilkan terjemahan berdasarkan Teks Sumber, Profil, Genre, dan Lapis yang dikirimkan user. Tulis dalam Markdown yang rapi dan terstruktur baik.
`;

        // UI Functions
        function clearText() {
            document.getElementById('sourceText').value = '';
            document.getElementById('sourceText').focus();
        }

        function showModal(type, title, message) {
            const modal = document.getElementById('messageModal');
            const modalContent = document.getElementById('modalContent');
            const iconContainer = document.getElementById('modalIcon');
            
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;

            if (type === 'error') {
                iconContainer.className = 'w-14 h-14 mx-auto mb-4 rounded-2xl flex items-center justify-center bg-rose-100 text-rose-600 shadow-inner border border-rose-200';
                iconContainer.innerHTML = '<i data-lucide="triangle-alert" class="w-7 h-7"></i>';
            } else {
                iconContainer.className = 'w-14 h-14 mx-auto mb-4 rounded-2xl flex items-center justify-center bg-emerald-100 text-emerald-600 shadow-inner border border-emerald-200';
                iconContainer.innerHTML = '<i data-lucide="badge-check" class="w-7 h-7"></i>';
            }
            lucide.createIcons();

            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modalContent.classList.remove('scale-95', 'opacity-0');
            modalContent.classList.add('scale-100', 'opacity-100');
        }

        function closeModal() {
            const modal = document.getElementById('messageModal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); 
        }

        async function callGeminiAPI(prompt, retries = 3) {
            // Memastikan menggunakan model Gemini 1.5 Flash yang paling stabil
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                generationConfig: {
                    temperature: 0.2, 
                }
            };

            const delays = [1000, 2000, 4000];

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        // Menangkap pesan error spesifik dari Google API
                        throw new Error(data.error?.message || `HTTP error! status: ${response.status}`);
                    }

                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error('Respons AI kosong atau formatnya berubah.');
                    }
                } catch (error) {
                    if (i === retries - 1) {
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function processTranslation() {
            const text = document.getElementById('sourceText').value.trim();
            if (!text) {
                showModal('error', 'Teks Masih Kosong', 'Silakan masukkan naskah Arab atau teks sumber terlebih dahulu di panel sebelah kiri.');
                return;
            }

            if (!apiKey || apiKey === "MASUKKAN_API_KEY_ANDA_DISINI") {
                showModal('error', 'API Key Belum Diisi', 'Sistem AI belum tersambung. Silakan masukkan API Key Anda di dalam kode HTML terlebih dahulu.');
                return;
            }

            const profile = document.getElementById('profileSelect').value;
            const genre = document.getElementById('genreSelect').value;
            
            let layers = [];
            if (document.getElementById('lapis1').checked) layers.push("Lapis 1 (Literal)");
            if (document.getElementById('lapis2').checked) layers.push("Lapis 2 (Kontekstual)");
            if (document.getElementById('lapis3').checked) layers.push("Lapis 3 (Akademisi)");
            if (document.getElementById('lapis4').checked) layers.push("Lapis 4 (Syarah Ringkas)");

            if (layers.length === 0) {
                showModal('error', 'Pilih Lapisan Output', 'Pilih minimal satu lapisan terjemahan (Literal, Kontekstual, Akademisi, atau Syarah).');
                return;
            }

            const userPrompt = `
Proses teks berikut menggunakan sistem Turots V4.0.
[KONFIGURASI]
Target Pembaca : ${profile}
Genre          : ${genre}
Lapisan Output : ${layers.join(", ")}

[TEKS SUMBER]
${text}
`;

            const resultContent = document.getElementById('resultContent');
            document.getElementById('welcomeState').classList.add('hidden');
            resultContent.classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Memproses...</span>';
            lucide.createIcons();

            try {
                const markdownResult = await callGeminiAPI(userPrompt);
                
                const renderer = new marked.Renderer();
                const originalText = renderer.text.bind(renderer);
                
                renderer.text = function(text) {
                    const arabicRegex = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/;
                    if (arabicRegex.test(text)) {
                         return `<span class="arabic-text" dir="rtl">${text}</span>`;
                    }
                    return originalText(text);
                };

                marked.setOptions({ renderer: renderer });
                let htmlResult = marked.parse(markdownResult);
                
                htmlResult = htmlResult.replace(/<p>([\s\S]*?[\u0600-\u06FF][\s\S]*?)<\/p>/g, function(match, p1) {
                    if ((match.match(/[\u0600-\u06FF]/g) || []).length > 10) {
                        return `<p dir="rtl" class="arabic-text text-right">${p1}</p>`;
                    }
                    return match;
                });

                resultContent.innerHTML = htmlResult;
                resultContent.classList.remove('hidden');
                
            } catch (error) {
                console.error("Translation Error:", error);
                // Menampilkan detail error asli dari Google di layar HP Anda
                showModal('error', 'Gagal Memproses', `Detail Error: ${error.message}`);
                
                if(resultContent.innerHTML.trim() === '') {
                    document.getElementById('welcomeState').classList.remove('hidden');
                } else {
                    resultContent.classList.remove('hidden');
                }
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                btn.innerHTML = '<span class="absolute right-0 w-8 h-32 -mt-12 transition-all duration-1000 transform translate-x-12 bg-white opacity-10 rotate-12 group-hover:-translate-x-96 ease"></span><i data-lucide="cpu" class="w-5 h-5"></i><span>Eksekusi Terjemahan</span>';
                lucide.createIcons();
            }
        }

        function copyOutput() {
            const content = document.getElementById('resultContent').innerText;
            if (!content || document.getElementById('resultContent').classList.contains('hidden')) {
                showModal('error', 'Tidak Ada Teks', 'Tidak ada hasil terjemahan untuk disalin. Silakan eksekusi teks terlebih dahulu.');
                return;
            }

            const textArea = document.createElement("textarea");
            textArea.value = content;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showModal('success', 'Teks Disalin', 'Seluruh hasil terjemahan beserta format akademisnya berhasil disalin ke clipboard.');
            } catch (err) {
                showModal('error', 'Gagal Menyalin', 'Browser Anda tidak mendukung penyalinan otomatis.');
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
